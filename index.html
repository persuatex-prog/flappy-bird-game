<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#70c5ce">
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="start-screen" class="screen">
      <h1>🐦 Flappy Bird</h1>
      <p class="subtitle">Tap or Click to Fly!</p>
      <button id="start-btn" class="btn">Start Game</button>
      <p class="high-score-display">High Score: <span id="start-high-score">0</span></p>
    </div>
    <div id="gameover-screen" class="screen hidden">
      <h1>💀 Game Over!</h1>
      <div class="score-board">
        <p>Score: <span id="final-score">0</span></p>
        <p>Best: <span id="gameover-high-score">0</span></p>
      </div>
      <button id="restart-btn" class="btn">Play Again</button>
    </div>
    <div id="score-display" class="hidden">
      <span id="current-score">0</span>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
